name: CI/CD Deployment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. Backend CI/CD
  backend-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          
      - name: Build and Test Backend
        run: |
          cd fashion-ecommerce/backend
          mvn clean package -DskipTests
          
      - name: Trigger Render Deployment
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.RENDER_DEPLOY_HOOK != ''
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

  # 2. Frontend CI/CD (GitHub Pages)
  frontend-deploy:
    runs-on: ubuntu-latest
    needs: backend-deploy
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fashion-ecommerce/frontend/package-lock.json
          
      - name: Install Dependencies
        run: |
          cd fashion-ecommerce/frontend
          npm install
          
      - name: Build Frontend
        run: |
          cd fashion-ecommerce/frontend
          npm run build
          
      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./fashion-ecommerce/frontend/dist
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
