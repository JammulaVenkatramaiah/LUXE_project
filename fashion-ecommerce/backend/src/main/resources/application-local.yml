spring:
  profiles:
    active: local
  datasource:
    url: jdbc:h2:mem:fashion_ecommerce;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  
  # Disable Elasticsearch for local mode to avoid connection errors
  data:
    elasticsearch:
      repositories:
        enabled: false
  elasticsearch:
    rest:
      uris: http://localhost:9200
    enabled: false

# Override logging for local development
logging:
  level:
    org.springframework.data.elasticsearch: OFF
    org.springframework.boot.autoconfigure.data.elasticsearch: OFF
